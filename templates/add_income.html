<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Income</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="center-page">

    <div class="form-container">

        <div class="form-box">

            <h1>➕ Add Income</h1>

            <p class="subtitle">
                Manage your earnings professionally
            </p>

            <form method="POST">

                <div class="input-group">

                    <label>Income Amount</label>

                    <input type="number"
                           name="amount"
                           placeholder="Enter income amount"
                           required>

                </div>

                <button type="submit">
                    Add Income
                </button>

            </form>

            <a href="/" class="back-btn">
                ⬅ Back To Dashboard
            </a>

        </div>

    </div>

</body>

</html>
