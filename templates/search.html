<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Search Expenses</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>💰 Expense Tracker</h2>

        <a href="/">🏠 Dashboard</a>

        <a href="/income">➕ Add Income</a>

        <a href="/expense">➖ Add Expense</a>

        <a href="/balance">📊 Balance</a>

        <a href="/history">📜 History</a>

        <a href="/charts">📈 Charts</a>

        <a href="/search">🔎 Search</a>

    </div>


    <!-- MAIN CONTENT -->
    <div class="main-content">

        <div class="top-bar">

            <h1>🔎 Search Expenses</h1>

            <p>Find expenses by category</p>

        </div>


        <!-- SEARCH BOX -->
        <div class="form-container">

            <form method="POST">

                <input type="text"
                       name="keyword"
                       placeholder="Enter category name"
                       required>

                <button type="submit">

                    Search

                </button>

            </form>

        </div>


        <!-- SEARCH RESULTS -->
        <div class="table-container">

            <table>

                <tr>

                    <th>Date</th>

                    <th>Category</th>

                    <th>Amount</th>

                </tr>

                {% for item in results %}

                <tr>

                    <td>{{ item.date }}</td>

                    <td>{{ item.category }}</td>

                    <td>₹ {{ item.amount }}</td>

                </tr>

                {% endfor %}

            </table>

        </div>

    </div>

</body>

</html>
