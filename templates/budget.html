<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="center-page">

<div class="form-container">

<h1>💰 Set Budget</h1>

</button>

</div>

</form>

</div>

</body>
</html>
